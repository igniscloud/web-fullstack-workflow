<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SQLite Example</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #efe8dd;
        --panel: rgba(255, 250, 244, 0.94);
        --ink: #1f1a16;
        --muted: #6f6359;
        --accent: #146c7f;
        --accent-strong: #0c4f5d;
        --accent-soft: rgba(20, 108, 127, 0.12);
        --border: rgba(31, 26, 22, 0.09);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(20, 108, 127, 0.18), transparent 28%),
          radial-gradient(circle at bottom right, rgba(190, 125, 71, 0.16), transparent 24%),
          linear-gradient(160deg, #f7f1e7 0%, #e8ddd0 100%);
      }

      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 20px;
      }

      .card {
        width: min(760px, 100%);
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: 0 28px 90px rgba(34, 26, 20, 0.12);
        backdrop-filter: blur(20px);
      }

      .eyebrow {
        margin: 0 0 12px;
        font-size: 0.82rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent-strong);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 7vw, 4.6rem);
        line-height: 0.95;
      }

      .lead {
        margin: 16px 0 0;
        max-width: 46rem;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .grid {
        display: grid;
        gap: 16px;
        margin-top: 28px;
      }

      .panel {
        padding: 18px 20px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(31, 26, 22, 0.07);
      }

      .label {
        margin: 0 0 8px;
        font-size: 0.86rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .value {
        margin: 0;
        font-size: 1.12rem;
        line-height: 1.6;
        word-break: break-word;
      }

      .counter {
        font-size: clamp(2.4rem, 8vw, 4.4rem);
        font-weight: 800;
        color: var(--accent-strong);
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 8px var(--accent-soft);
      }

      .controls {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 22px;
      }

      input {
        flex: 1 1 320px;
        min-width: 0;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid rgba(31, 26, 22, 0.12);
        background: rgba(255, 255, 255, 0.9);
        color: var(--ink);
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 14px;
        padding: 14px 18px;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: white;
        color: var(--ink);
        border: 1px solid rgba(31, 26, 22, 0.12);
      }

      button:disabled {
        cursor: progress;
        opacity: 0.7;
      }

      @media (max-width: 640px) {
        .card {
          padding: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app" class="shell">
      <main class="card">
        <p class="eyebrow">Ignis Example</p>
        <h1>SQLite Counter</h1>
        <p class="lead">
          这是一个最小的前后端组合示例。页面通过同域的 <code>/api</code>
          调用 SQLite-backed HTTP service，并显示持久化计数器的当前值。
        </p>

        <section class="grid">
          <article class="panel">
            <p class="label">Counter</p>
            <p v-if="loading" class="value status">
              <span class="dot"></span>
              正在读取 SQLite 状态...
            </p>
            <p v-else-if="error" class="value">{{ error }}</p>
            <p v-else class="value counter">{{ counter }}</p>
          </article>

          <article class="panel">
            <p class="label">API Base</p>
            <p class="value">{{ apiBase }}</p>
          </article>
        </section>

        <section class="controls">
          <input v-model="apiBase" type="text" spellcheck="false" />
          <button type="button" @click="incrementCounter" :disabled="loading">
            {{ loading ? "Working..." : "Increment Counter" }}
          </button>
          <button
            type="button"
            class="secondary"
            @click="loadCounter"
            :disabled="loading"
          >
            Refresh
          </button>
        </section>
      </main>
    </div>

    <script>
      const defaultApiBase = () => {
        if (
          window.location.hostname === "127.0.0.1" ||
          window.location.hostname === "localhost"
        ) {
          return "http://127.0.0.1:3001";
        }
        return `${window.location.origin}/api`;
      };

      const parseCounter = (text) => {
        const match = text.match(/counter=(\d+)/);
        if (!match) {
          throw new Error(`unexpected response: ${text}`);
        }
        return Number(match[1]);
      };

      Vue.createApp({
        data() {
          return {
            apiBase: defaultApiBase(),
            loading: false,
            counter: 0,
            error: "",
          };
        },
        methods: {
          async requestCounter(path, options = {}) {
            const response = await fetch(`${this.apiBase}${path}`, options);
            if (!response.ok) {
              throw new Error(`backend returned ${response.status}`);
            }
            return parseCounter(await response.text());
          },
          async loadCounter() {
            this.loading = true;
            this.error = "";
            try {
              this.counter = await this.requestCounter("");
            } catch (error) {
              this.error = error instanceof Error ? error.message : String(error);
            } finally {
              this.loading = false;
            }
          },
          async incrementCounter() {
            this.loading = true;
            this.error = "";
            try {
              this.counter = await this.requestCounter("/increment", { method: "POST" });
            } catch (error) {
              this.error = error instanceof Error ? error.message : String(error);
            } finally {
              this.loading = false;
            }
          },
        },
        mounted() {
          this.loadCounter();
        },
      }).mount("#app");
    </script>
  </body>
</html>
