<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenCode Agent E2E</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f4;
        --ink: #161616;
        --muted: #5f665f;
        --line: #d7dbd2;
        --surface: #ffffff;
        --accent: #176f64;
        --accent-ink: #ffffff;
        --warn: #8a4b12;
        --error: #a83d3d;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: var(--bg);
      }

      .shell {
        width: min(1040px, 100%);
        margin: 0 auto;
        padding: 48px 20px;
      }

      header {
        display: grid;
        gap: 10px;
        margin-bottom: 28px;
      }

      .eyebrow {
        margin: 0;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 760px;
        font-size: clamp(2.25rem, 5vw, 4.6rem);
        line-height: 0.98;
      }

      .lead {
        margin: 0;
        max-width: 700px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.7;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(320px, 1.1fr);
        gap: 18px;
        align-items: start;
      }

      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 20px;
      }

      label,
      .label {
        display: block;
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 0.86rem;
        font-weight: 700;
      }

      textarea {
        width: 100%;
        min-height: 170px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 14px;
        color: var(--ink);
        font: inherit;
        line-height: 1.55;
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 44px;
        margin-top: 14px;
        border: 0;
        border-radius: 6px;
        padding: 0 16px;
        color: var(--accent-ink);
        background: var(--accent);
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .status-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }

      .pill {
        min-height: 30px;
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0 10px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 800;
      }

      .pill.running {
        color: var(--warn);
      }

      .pill.succeeded {
        color: var(--accent);
      }

      .pill.failed {
        color: var(--error);
      }

      pre {
        min-height: 240px;
        margin: 0;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 14px;
        background: #f9faf8;
        font-size: 0.92rem;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 820px) {
        .shell {
          padding: 32px 16px;
        }

        .workspace {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="app" class="shell">
      <header>
        <p class="eyebrow">Ignis OpenCode Agent</p>
        <h1>Frontend to backend to agent-service</h1>
        <p class="lead">
          The page submits work to the API service. The API creates an internal
          OpenCode task and polls the stored agent result.
        </p>
      </header>

      <main class="workspace">
        <section>
          <label for="message">Message</label>
          <textarea id="message" v-model="message" spellcheck="true"></textarea>
          <button type="button" @click="submitTask" :disabled="busy || !message.trim()">
            <span>{{ busy ? "Running" : "Send" }}</span>
          </button>
        </section>

        <section>
          <div class="status-row">
            <span class="pill" :class="status">{{ status || "idle" }}</span>
            <span v-if="taskId" class="pill">{{ taskId }}</span>
          </div>
          <p class="label">Agent response</p>
          <pre>{{ output }}</pre>
        </section>
      </main>
    </div>

    <script>
      const apiBase = () => {
        if (
          window.location.hostname === "127.0.0.1" ||
          window.location.hostname === "localhost"
        ) {
          return "http://127.0.0.1:3001";
        }
        return `${window.location.origin}/api`;
      };

      Vue.createApp({
        data() {
          return {
            baseUrl: apiBase(),
            message: "Reply with a short confirmation that the OpenCode end-to-end path works.",
            taskId: "",
            status: "",
            output: "",
            busy: false,
            pollTimer: null,
          };
        },
        methods: {
          async submitTask() {
            this.clearPoll();
            this.busy = true;
            this.status = "queued";
            this.output = "";
            this.taskId = "";

            try {
              const response = await fetch(`${this.baseUrl}/tasks`, {
                method: "POST",
                headers: { "content-type": "application/json" },
                body: JSON.stringify({ message: this.message }),
              });
              const body = await response.json();
              if (!response.ok) {
                throw new Error(body.error || `backend returned ${response.status}`);
              }
              this.taskId = body.task_id;
              this.pollTask();
              this.pollTimer = window.setInterval(this.pollTask, 2000);
            } catch (error) {
              this.status = "failed";
              this.output = error instanceof Error ? error.message : String(error);
              this.busy = false;
            }
          },
          async pollTask() {
            if (!this.taskId) return;
            try {
              const response = await fetch(`${this.baseUrl}/tasks/${this.taskId}`);
              const body = await response.json();
              if (!response.ok) {
                throw new Error(body.error?.message || body.error || `backend returned ${response.status}`);
              }
              this.status = body.status;
              this.output = JSON.stringify(body.result || body.error || body, null, 2);
              if (body.status === "succeeded" || body.status === "failed") {
                this.busy = false;
                this.clearPoll();
              }
            } catch (error) {
              this.status = "failed";
              this.output = error instanceof Error ? error.message : String(error);
              this.busy = false;
              this.clearPoll();
            }
          },
          clearPoll() {
            if (this.pollTimer) {
              window.clearInterval(this.pollTimer);
              this.pollTimer = null;
            }
          },
        },
        beforeUnmount() {
          this.clearPoll();
        },
      }).mount("#app");
    </script>
  </body>
</html>
